version: 1
interface:
  display_name: Clipsmith Xiaohongshu Capture
  description: Export XiaoHongShu post text through the existing runner, then normalize post.md, summary.md, and any OCR transcript into a Clipsmith bundle.
  default_prompt: Use this skill for Xiaohongshu or XHS post URLs. Invoke the existing scripts/run.ts runner, never replace it with ad hoc automation, preserve URL query tokens for navigation, reuse the authenticated Chrome CDP session, and normalize output into an xhs Clipsmith bundle containing capture.json, post.md, summary.md, and ocr.md when OCR text was produced before validation. Do not discard OCR text after summarizing it; declare ocr.md in capture.json.content_files with kind ocr-text.
