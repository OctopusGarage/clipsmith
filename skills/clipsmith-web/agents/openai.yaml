version: 1
interface:
  display_name: Clipsmith Web Capture
  description: Capture a generic public web page into a validated Clipsmith web bundle.
  default_prompt: Use this skill for generic web pages when no platform-specific Clipsmith provider matches. Run the existing Playwright extractor under skills/clipsmith-web, then read prompts/extract-article.md and use the current AI session to normalize raw/source.html, raw/rendered.txt, and raw/metadata.json into clean post.md, summary.md, and capture.json. Keep raw audit files declared as assets. Run uv run clipsmith validate-bundle on the final bundle, run scripts/eval.mjs when a known eval profile matches the URL, then read prompts/evaluate-article.md and perform the AI eval checklist before reporting success. Before changing extraction, prompt, summary, or cleanup behavior, run scripts/eval.mjs against the committed kingson-agent-runtime-skill-ai fixture and run the provider regression script. Do not invent content when pages are login-gated, rate-limited, blocked by bot protection, or too ambiguous. Do not discard OCR text after summarizing it; declare ocr.md in capture.json.content_files with kind ocr-text when OCR was produced.
