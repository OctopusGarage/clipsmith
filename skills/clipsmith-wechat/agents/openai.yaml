version: 1
interface:
  display_name: Clipsmith WeChat Capture
  description: Export a WeChat public account article through the existing browser automation runner, then normalize post.md, summary.md, and any OCR transcript into a Clipsmith bundle.
  default_prompt: Use this skill for WeChat public account article URLs. Invoke the existing scripts/run.ts runner, never write replacement Playwright code, reuse the required Chrome CDP session, and normalize raw output into a wechat Clipsmith bundle containing capture.json, post.md, summary.md, and ocr.md when OCR text was produced before validation. Do not discard OCR text after summarizing it; declare ocr.md in capture.json.content_files with kind ocr-text.
