name: clipsmith-wechat
description: Browser-only automation skill to export a WeChat public account article into a local folder, including article.md, all embedded images, and optional video.
executor: scripts/run.ts
inputs:
  post_url:
    type: string
    required: false
    description: Full WeChat article URL (mp.weixin.qq.com/s/... or mp.weixin.qq.com/s?__biz=...). If omitted, runner prompts interactively.
  output_dir:
    type: string
    required: false
    default: ~/Downloads/wechat
    description: Target local directory where downloaded assets and metadata files will be stored.
  cdp_port:
    type: string
    required: false
    default: "9223"
    description: Chrome DevTools remote-debugging port; default 9223.
  profile_dir:
    type: string
    required: false
    default: ~/.chrome-labali-no-proxy
    description: Chrome user-data-dir used for the unified CDP startup command.
  timeout_ms:
    type: string
    required: false
    default: "60000"
    description: Navigation and extraction timeout in milliseconds.
  overwrite:
    type: boolean
    required: false
    default: false
    description: Overwrite existing files with the same generated names if true.
