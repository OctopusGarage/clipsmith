name: project-health
on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  health:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: check-health
        run: ./script/check-health.sh

  verify:
    needs: health
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All matrix checks passed
        run: test "${{ needs.health.result }}" = "success"
